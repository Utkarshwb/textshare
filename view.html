<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TextShare</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --pink: #f97316;
      --pink-glow: rgba(249,115,22,0.07);
      --white: #f5f5f5;
      --dim: rgba(245,245,245,0.3);
      --border: rgba(245,245,245,0.1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-size: 125%;
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Mono', monospace;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: #050505;
    }

    .shell {
      position: relative; z-index: 1;
      width: 100%; height: 100vh;
      display: grid;
      grid-template-rows: 57px 1fr;
    }

    /* ── top bar ── */
    .top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 36px;
      border-bottom: 1px solid var(--border);
      opacity: 0; animation: up .45s ease .05s forwards;
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 0.82rem; letter-spacing: 5px; text-transform: uppercase;
      font-weight: 600;
      color: var(--dim); text-decoration: none;
    }
    .wordmark b { color: var(--pink); font-weight: 700; }

    .top-right { display: flex; align-items: center; gap: 24px; }

    .expires {
      font-size: 0.58rem; letter-spacing: 2px;
      text-transform: uppercase; color: var(--dim);
    }

    .action-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'DM Mono', monospace; font-size: 0.58rem;
      letter-spacing: 2px; text-transform: uppercase; color: var(--dim);
      transition: color .2s; padding: 0;
      text-decoration: underline; text-underline-offset: 3px;
    }
    .action-btn:hover { color: var(--pink); }

    .new-link {
      font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--dim); text-decoration: none; transition: color .2s;
    }
    .new-link:hover { color: var(--white); }

    /* ── scrollable content zone ── */
    .content-zone {
      overflow-y: auto; overflow-x: hidden;
      opacity: 0; animation: up .45s ease .13s forwards;
    }
    .content-zone::-webkit-scrollbar { width: 3px; }
    .content-zone::-webkit-scrollbar-track { background: transparent; }
    .content-zone::-webkit-scrollbar-thumb { background: rgba(245,245,245,0.08); border-radius: 2px; }

    .inner {
      max-width: 920px; margin: 0 auto;
      padding: 32px 36px;
    }

    /* card wrapping the paste */
    .paste-card {
      border-radius: 12px;
      background: #050505;
      padding: 28px 28px;
    }

    /* loading */
    .loading {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--dim);
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--pink); animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

    /* error */
    .err-label { font-size: 0.58rem; letter-spacing: 4px; text-transform: uppercase; color: var(--pink); margin-bottom: 10px; }
    .err-msg { font-size: 0.82rem; color: var(--dim); margin-bottom: 22px; line-height: 1.6; }
    .err-link { font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--pink); text-decoration: none; }
    .err-link:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* ── markdown ── */
    .md { font-family: 'Lora', serif; font-size: 0.97rem; line-height: 1.9; color: rgba(245,245,245,.82); }

    .md h1,.md h2,.md h3,.md h4 {
      font-family: 'DM Mono', monospace; font-weight: 500;
      color: var(--white); margin: 1.8em 0 .5em; line-height: 1.3; letter-spacing: -.3px;
    }
    .md h1 { font-size: 1.4rem; }
    .md h2 { font-size: 1.1rem; }
    .md h3 { font-size: 0.92rem; }
    .md h1:first-child,.md h2:first-child,.md h3:first-child { margin-top: 0; }

    .md p { margin-bottom: 1em; }
    .md strong { color: var(--white); font-weight: 600; }
    .md em { font-style: italic; color: rgba(245,245,245,.55); }

    .md a { color: var(--pink); text-decoration: none; border-bottom: 1px solid rgba(236,72,153,.25); transition: border-color .2s; }
    .md a:hover { border-color: var(--pink); }

    .md code {
      font-family: 'DM Mono', monospace; font-size: .82em;
      background: rgba(236,72,153,.08); border: 1px solid rgba(236,72,153,.15);
      border-radius: 4px; padding: 1px 6px; color: var(--pink);
    }

    .md pre {
      background: rgba(0,0,0,.5); border: 1px solid var(--border);
      border-radius: 8px; padding: 20px; overflow-x: auto; margin: 1.2em 0;
    }
    .md pre code { background: none; border: none; padding: 0; color: rgba(245,245,245,.8); font-size: .84rem; }

    .md blockquote {
      border-left: 2px solid var(--pink); padding-left: 16px;
      margin: 1.2em 0; color: var(--dim); font-style: italic;
    }

    .md ul,.md ol { padding-left: 1.3em; margin-bottom: 1em; }
    .md li { margin-bottom: .35em; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 1.8em 0; }

    .md table { width: 100%; border-collapse: collapse; margin: 1.2em 0; font-family: 'DM Mono', monospace; font-size: .78rem; }
    .md th { color: var(--pink); font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(236,72,153,.2); }
    .md td { padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--dim); }

    /* ── footer ── */
    .foot {
      display: flex; align-items: center; justify-content: center;
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 48px;
      border-top: 1px solid var(--border);
      font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(245,245,245,.45);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s ease, transform .2s ease;
      background: #050505;
    }
    .foot.show { opacity: 1; transform: translateY(0); }
    .foot span { color: var(--pink); margin: 0 4px; }

    @keyframes up {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
<div class="bg"></div>

<div class="shell">

  <div class="top">
    <a href="/" class="wordmark">Text<b>Share</b></a>
    <div class="top-right">
      <span class="expires" id="expires"></span>
      <button class="action-btn" onclick="copyLink(this)">copy link</button>
      <a href="/" class="new-link">+ new</a>
    </div>
  </div>

  <div class="content-zone">
    <div class="inner">
      <div class="paste-card">
        <div class="loading" id="loading">
          <div class="dot"></div>
          <span>fetching</span>
        </div>
        <div class="md" id="md" style="display:none"></div>
        <div id="err" style="display:none">
          <div class="err-label">not found</div>
          <div class="err-msg">This paste doesn't exist or has expired.</div>
          <a href="/" class="err-link">← create a new paste</a>
        </div>
      </div>
    </div>
  </div>

  <div class="foot">made with <span>♥</span> by utkarsh</div>

</div>

<script>
  const codename = location.pathname.slice(1);
  const contentZone = document.querySelector('.content-zone');
  const foot = document.querySelector('.foot');
  document.title = `${codename} — TextShare`;

  function updateFooterVisibility() {
    const atBottom = contentZone.scrollHeight - contentZone.scrollTop - contentZone.clientHeight <= 2;
    foot.classList.toggle('show', atBottom);
  }

  async function load() {
    try {
      const res = await fetch(`/api/paste/${codename}`);
      if (!res.ok) return showErr();
      const { paste } = await res.json();

      document.getElementById('md').innerHTML = DOMPurify.sanitize(marked.parse(paste.content));
      document.getElementById('md').style.display = 'block';
      document.getElementById('loading').style.display = 'none';

      if (paste.expiresAt) {
        const diff = new Date(paste.expiresAt) - Date.now();
        const mins = Math.round(diff / 60000);
        const hrs  = Math.round(diff / 3600000);
        document.getElementById('expires').textContent =
          mins < 1 ? 'expiring soon' : mins < 60 ? `expires in ${mins}m` : `expires in ${hrs}h`;
      }
    } catch { showErr(); }
  }

  function showErr() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').style.display = 'block';
    updateFooterVisibility();
  }

  function copyLink(btn) {
    navigator.clipboard.writeText(location.href);
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = 'copy link', 2000);
  }

  contentZone.addEventListener('scroll', updateFooterVisibility);
  window.addEventListener('resize', updateFooterVisibility);

  load();
  requestAnimationFrame(updateFooterVisibility);
</script>
</body>
</html>
